name: CI

on:
  push:
    branches: [ main, 'tidy/*' ]
  pull_request:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt pytest

      - name: Run HTML sanity check
        run: python tools/check_html.py

      - name: Run accessibility quick check
        run: python tools/a11y_check.py

      - name: Run unit tests
        run: pytest -q

  pa11y:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Start static server
        run: |
          python -m pip install --upgrade pip
          nohup python -m http.server 8000 &
          sleep 2
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install pa11y
        run: npm install -g pa11y
      - name: Run Pa11y accessibility checks
        run: pa11y http://localhost:8000/index.html || true
