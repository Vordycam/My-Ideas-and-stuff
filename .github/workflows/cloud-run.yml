name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-ideas-and-stuff-server:latest

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Configure Docker auth for GCR (optional)
        run: gcloud auth configure-docker --quiet

      - name: Deploy to Cloud Run
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/my-ideas-and-stuff-server:latest
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE }} \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --project "${{ secrets.GCP_PROJECT }}"
        env:
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
