name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-ideas-and-stuff-server:latest

      - name: Authenticate to GCP (OIDC or service account key)
        uses: 'google-github-actions/auth@v1'
        with:
          # Prefer workload identity provider (no long-lived key in repo)
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          workload_identity_service_account: ${{ secrets.GCP_SA_EMAIL }}
          # Fallback: if you have a service account key secret, the action will use it
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth for GCR (optional)
        run: gcloud auth configure-docker --quiet

      - name: Deploy to Cloud Run
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/my-ideas-and-stuff-server:latest
          echo "Deploying $IMAGE to Cloud Run service '${{ secrets.CLOUD_RUN_SERVICE }}' in region '${{ secrets.GCP_REGION }}'"
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --project "${{ secrets.GCP_PROJECT }}"
        env:
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
